name: CI/CD Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  BACKEND_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/snakeladder-server
  FRONTEND_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/snakeladder-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./SL_Backend
          file: ./SL_Backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./SL_Frontend
          file: ./SL_Frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://snakesladders.gobyabhijit.com
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment directory on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ELASTIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ec2-user/snakeladder

      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ELASTIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/docker-compose.ec2.yml,deploy/deploy-ec2.sh"
          target: "/home/ec2-user/snakeladder"
          strip_components: 1

      - name: Write deployment environment file on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ELASTIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ec2-user/snakeladder
            cat <<'EOF' >/home/ec2-user/snakeladder/.env
            BACKEND_IMAGE=${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
            FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
            BACKEND_HOST_PORT=9090
            FRONTEND_HOST_PORT=3000
            EOF

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ELASTIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            chmod +x /home/ec2-user/snakeladder/deploy-ec2.sh
            /home/ec2-user/snakeladder/deploy-ec2.sh
